name: DevSecOps Pipeline Trigger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar Pipeline en VPS Connor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Iniciando Pipeline DevSecOps..."
            kubectl apply -f /scripts/tekton/run-pipeline-final.yaml
