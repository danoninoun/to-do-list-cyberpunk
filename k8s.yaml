apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberpunk-todo
  namespace: default
spec:
  replicas: 2 # Levantaremos 2 copias de la app para alta disponibilidad
  selector:
    matchLabels:
      app: cyberpunk-todo
  template:
    metadata:
      labels:
        app: cyberpunk-todo
    spec:
      containers:
      - name: web
        image: danoninoun/to-do-list-cyberpunk:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cyberpunk-todo-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: cyberpunk-todo
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # La app será accesible desde el puerto 30080
